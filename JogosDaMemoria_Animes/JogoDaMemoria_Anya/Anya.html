                    ]

                    cartas.sort(() => Math.random()- 0.5);
                    let primeiraCarta = null;
                    let segundaCarta = null;
                    let bloqueado = false;

                    function VirarCarta(posicao) {
                        if (bloqueado) return
                        let carta = document.getElementById(posicao);
                        let personagem = cartas[posicao-1];
                         
                        carta.src = "img/" + personagem + ".jpg";
                        // <img src="../JogoDaMemoria_Anya/img/AnyaForger.jpg" alt="">
                        if (primeiraCarta == null) {
                            primeiraCarta = posicao
                        }else if(segundaCarta == null) {
                            segundaCarta = posicao
                            bloqueado = true
                            setTimeout(verificarPar, 800)
                        }
                    }
                    function verificarPar() {
                        let personagem1 = cartas[primeiraCarta-1];
                        let personagem2 = cartas[segundaCarta-1]
                        if(personagem1 == personagem2) {
                            paresEncontrados++;
                            verificarVitoria();
                            
                            primeiraCarta = null;
                            segundaCarta = null;
                            bloqueado = false;
                        }else{
                            document.getElementById(primeiraCarta).src = "../JogoDaMemoria_Anya/img/VersoDaCarta.jpg";
                            document.getElementById(segundaCarta).src = "../JogoDaMemoria_Anya/img/VersoDaCarta.jpg";
                            primeiraCarta = null;
                            segundaCarta = null;
                            bloqueado = false;
                        }
                    }
                    let paresEncontrados = 0;
                    let totalPares = 10;
                    function verificarVitoria(){
                        if (paresEncontrados == totalPares){
                            alert("Vitória! Você encontrou todos os pares!")
                        }
                    }
                    function comecarJogo() {
                    document.getElementById("tela-inicial").style.display = "none"
                    };
